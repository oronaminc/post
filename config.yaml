# =============================================================================
#  한국/일본/대만 트렌드 모니터링 대시보드 설정
#  - 지역(regions), 카테고리(categories), 데이터 소스(sources)를 여기서 관리.
#  - 변경 후에는 서버를 재시작하세요. (./scripts/service.sh restart)
# =============================================================================

# -----------------------------------------------------------------------------
# 지역(타겟) — UI 상단에서 전환. 첫 항목이 기본 지역.
# -----------------------------------------------------------------------------
regions:
  - id: kr
    label: 한국
    flag: "🇰🇷"
    enabled: true
  - id: jp
    label: 일본
    flag: "🇯🇵"
    enabled: true
  - id: tw
    label: 대만
    flag: "🇹🇼"
    enabled: true

# -----------------------------------------------------------------------------
# 카테고리 (지역 공통 id, 검색어만 지역별로: {kr:[...], jp:[...], tw:[...]})
#   nhk_cats 는 일본 전용
# -----------------------------------------------------------------------------
categories:
  - id: subsidy
    label: 보조금
    label_ja: 補助金
    news_queries:
      kr: ["보조금", "지원금", "재난지원금"]
      jp: ["補助金", "給付金", "助成金"]
      tw: ["補助", "補貼", "津貼"]
    keywords:
      kr: ["보조금"]
      jp: ["補助金"]
      tw: ["補助"]

  - id: entertainment
    label: 연예
    label_ja: 芸能
    news_queries:
      kr: ["연예", "아이돌", "K팝"]
      jp: ["芸能", "エンタメ"]
      tw: ["娛樂", "藝人", "明星"]
    keywords:
      kr: ["연예"]
      jp: ["芸能"]
      tw: ["藝人"]

  - id: politics
    label: 정치
    label_ja: 政治
    news_queries:
      kr: ["정치"]
      jp: ["政治"]
      tw: ["政治", "選舉"]
    keywords:
      kr: ["정치"]
      jp: ["政治"]
      tw: ["政治"]
    nhk_cats: ["cat4"]

  - id: shopping
    label: 쇼핑
    label_ja: ショッピング
    news_queries:
      kr: ["쇼핑", "할인", "세일"]
      jp: ["セール", "通販", "ショッピング"]
      tw: ["購物", "特賣", "折扣"]
    keywords:
      kr: ["쇼핑"]
      jp: ["セール"]
      tw: ["購物"]

  - id: trend
    label: 트렌드
    label_ja: トレンド
    # 실시간 급상승(signal.bz / Google 트렌드 등)이 주로 채웁니다.
    keywords:
      kr: ["트렌드"]
      jp: ["トレンド"]
      tw: ["熱門"]

  - id: economy
    label: 경제
    label_ja: 経済
    news_queries:
      kr: ["경제", "주가", "환율"]
      jp: ["経済"]
      tw: ["經濟", "股市"]
    keywords:
      kr: ["경제", "주가"]
      jp: ["経済", "株価"]
      tw: ["經濟", "股市"]
    nhk_cats: ["cat5"]

  - id: current_affairs
    label: 시사
    label_ja: 時事
    news_queries:
      kr: ["뉴스", "시사"]
      jp: ["ニュース", "時事"]
      tw: ["新聞", "時事"]
    keywords:
      kr: ["뉴스"]
      jp: ["ニュース"]
      tw: ["新聞"]
    nhk_cats: ["cat0", "cat6"]

  - id: sports
    label: 스포츠
    label_ja: スポーツ
    news_queries:
      kr: ["스포츠", "야구", "축구"]
      jp: ["スポーツ", "野球", "サッカー"]
      tw: ["體育", "棒球", "籃球"]
    keywords:
      kr: ["스포츠"]
      jp: ["スポーツ"]
      tw: ["體育"]

  - id: tech
    label: IT·테크
    label_ja: テック
    news_queries:
      kr: ["IT", "인공지능", "테크"]
      jp: ["IT", "AI", "テクノロジー"]
      tw: ["科技", "AI", "半導體"]
    keywords:
      kr: ["인공지능"]
      jp: ["AI"]
      tw: ["科技"]

  - id: realestate
    label: 부동산
    label_ja: 不動産
    news_queries:
      kr: ["부동산", "집값"]
      jp: ["不動産", "住宅"]
      tw: ["房地產", "房價"]
    keywords:
      kr: ["부동산"]
      jp: ["不動産"]
      tw: ["房地產"]

  - id: health
    label: 건강
    label_ja: 健康
    news_queries:
      kr: ["건강", "의료"]
      jp: ["健康", "医療"]
      tw: ["健康", "醫療"]
    keywords:
      kr: ["건강"]
      jp: ["健康"]
      tw: ["健康"]

  - id: world
    label: 국제
    label_ja: 国際
    news_queries:
      kr: ["국제", "해외"]
      jp: ["国際", "海外"]
      tw: ["國際", "國外"]
    keywords:
      kr: ["국제"]
      jp: ["国際"]
      tw: ["國際"]

  - id: game
    label: 게임
    label_ja: ゲーム
    news_queries:
      kr: ["게임", "e스포츠"]
      jp: ["ゲーム", "eスポーツ"]
      tw: ["遊戲", "電競"]
    keywords:
      kr: ["게임"]
      jp: ["ゲーム"]
      tw: ["遊戲"]

# -----------------------------------------------------------------------------
# 데이터 소스 (어댑터)
#   regions: 이 소스가 서비스하는 지역 목록
#   enabled: false 면 수집 안 함. ⚠️는 이용약관/차단 리스크(README 참고)
# -----------------------------------------------------------------------------
sources:
  # ✅ 낮은 리스크 (공개 RSS) — 한국/일본/대만 공통
  google_trends_rss:
    enabled: true
    regions: [kr, jp, tw]
    geo: { kr: KR, jp: JP, tw: TW }
    default_category: trend
    max_items: 25

  # ✅ 낮은 리스크 (RSS 신디케이션) — 카테고리 뉴스 커버, 3개국 공통
  google_news_rss:
    enabled: true
    regions: [kr, jp, tw]
    per_category_limit: 12
    locale:
      kr: { hl: ko,    gl: KR, ceid: "KR:ko" }
      jp: { hl: ja,    gl: JP, ceid: "JP:ja" }
      tw: { hl: zh-TW, gl: TW, ceid: "TW:zh-Hant" }

  # ⚠️ 중간 리스크 (비공식 pytrends) — 지속 관심도, 3개국 공통
  google_trends_interest:
    enabled: true
    regions: [kr, jp, tw]
    geo: { kr: KR, jp: JP, tw: TW }
    hl:  { kr: ko,   jp: ja-JP, tw: zh-TW }
    timeframe: "now 7-d"
    max_keywords: 8
    batch_sleep_seconds: 2

  # ✅ 낮은 리스크 (공개 집계 API) — 한국 전용, 실시간 검색어(네이버/다음 실검 대체)
  signal_bz:
    enabled: true
    regions: [kr]
    default_category: trend

  # ✅ 낮은 리스크 (네이버 공식 Open API) — 한국 전용. .env 의 NAVER_CLIENT_ID/SECRET 필요.
  #   무료 발급: https://developers.naver.com (없으면 graceful, 헬스에 '키 미설정' 표시)
  naver_news:
    enabled: true
    regions: [kr]
    per_category_limit: 8
    sort: date               # date(최신) | sim(정확도)
  naver_datalab:
    enabled: true
    regions: [kr]
    window_days: 30          # 검색어트렌드 집계 기간

  # ✅ 낮은 리스크 (NHK 공식 RSS) — 일본 전용
  nhk_rss:
    enabled: true
    regions: [jp]
    per_feed_limit: 12
    feeds:
      cat0: current_affairs
      cat1: current_affairs
      cat3: tech            # 科学・文化
      cat4: politics
      cat5: economy
      cat6: world           # 国際
      cat7: sports          # スポーツ

  # ⚠️ 중간 리스크 (제3자 사이트 스크래핑) — 일본 전용(대만판 없음)
  trend_calendar:
    enabled: true
    regions: [jp]
    base_url: { jp: "https://jp.trend-calendar.com/" }
    default_category: trend
    max_items: 30

  # ⚠️ 중간 리스크 (PTT 커뮤니티 스크래핑) — 대만 전용 현지 소셜 트렌드
  ptt_taiwan:
    enabled: true
    regions: [tw]
    per_board_limit: 8
    min_push: 10
    boards:
      - { name: Gossiping,    category: current_affairs }
      - { name: HatePolitics, category: politics }
      - { name: Stock,        category: economy }
      - { name: movie,        category: entertainment }
      - { name: Lifeismoney,  category: shopping }
      - { name: C_Chat,       category: trend }
      - { name: Baseball,     category: sports }
      - { name: NBA,          category: sports }

  # ⚠️⚠️ 높은 리스크 (Yahoo Japan 약관이 자동수집 금지) — 일본 전용
  yahoo_realtime:
    enabled: true
    regions: [jp]
    default_category: trend
    max_items: 30

  # ⏸️ 비활성 — YouTube는 별도 도구에서 관리 중이라 이 대시보드에서는 끔.
  youtube_trending:
    enabled: false
    regions: [jp]
    region: JP
    max_items: 40
    category_map:
      "24": entertainment
      "10": entertainment
      "25": current_affairs
    default_category: trend

# -----------------------------------------------------------------------------
# 번역 (트렌드 워드 → 한국어). 한국(kr) 항목은 이미 한국어라 번역돼도 동일하면 표시 안 함.
#   무료·키 불필요(비공식 Google 엔드포인트). 같은 워드는 캐시로 1회만 번역.
# -----------------------------------------------------------------------------
translation:
  enabled: true
  target_lang: ko
  max_new_per_cycle: 300
  concurrency: 5
  timeout_seconds: 10

# -----------------------------------------------------------------------------
# 수집/분류/HTTP/서버
# -----------------------------------------------------------------------------
collection:
  refresh_interval_seconds: 900
  per_source_timeout_seconds: 90   # 지역 다수 + 카테고리 다수(소스별 다건 요청) 여유
  retention_days: 14
  run_on_startup: true

classification:
  persist_min_occurrences: 3
  persist_min_hours: 6

http:
  user_agent: "KR-JP-TW-Trend-Monitor/1.2 (local research dashboard; +https://github.com/oronaminc/post)"
  default_delay_seconds: 1.5
  timeout_seconds: 20
  max_retries: 3
  host_delays:
    search.yahoo.co.jp: 4.0
    jp.trend-calendar.com: 3.0
    trends.google.com: 2.0
    www.ptt.cc: 2.0
    news.google.com: 0.6        # 신디케이션 RSS — 지역 다수라 요청 간격 축소
    naverapihub.apigw.ntruss.com: 0.4   # 네이버 공식 API — 카테고리 다수 대응

server:
  host: "127.0.0.1"
  port: 8899

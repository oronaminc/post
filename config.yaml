# =============================================================================
#  일본/대만 트렌드 모니터링 대시보드 설정
#  - 지역(regions), 카테고리(categories), 데이터 소스(sources)를 여기서 관리.
#  - 변경 후에는 서버를 재시작하세요.
# =============================================================================

# -----------------------------------------------------------------------------
# 지역(타겟) — UI 상단에서 전환. 지역을 추가하려면 항목을 하나 더 넣고
#   각 소스의 regions/geo/locale, 카테고리의 news_queries/keywords에
#   해당 지역 키를 추가하면 됩니다.
# -----------------------------------------------------------------------------
regions:
  - id: jp
    label: 일본
    flag: "🇯🇵"
    enabled: true
  - id: tw
    label: 대만
    flag: "🇹🇼"
    enabled: true

# -----------------------------------------------------------------------------
# 카테고리 (지역 공통 id, 검색어만 지역별로)
#   news_queries / keywords 는 지역별 딕셔너리: {jp: [...], tw: [...]}
#   nhk_cats 는 일본 전용(있으면 NHK RSS 매핑에 사용)
# -----------------------------------------------------------------------------
categories:
  - id: subsidy
    label: 보조금
    label_ja: 補助金
    news_queries:
      jp: ["補助金", "給付金", "助成金"]
      tw: ["補助", "補貼", "津貼"]
    keywords:
      jp: ["補助金"]
      tw: ["補助"]

  - id: entertainment
    label: 연예
    label_ja: 芸能
    news_queries:
      jp: ["芸能", "エンタメ"]
      tw: ["娛樂", "藝人", "明星"]
    keywords:
      jp: ["芸能"]
      tw: ["藝人"]

  - id: politics
    label: 정치
    label_ja: 政治
    news_queries:
      jp: ["政治"]
      tw: ["政治", "選舉"]
    keywords:
      jp: ["政治"]
      tw: ["政治"]
    nhk_cats: ["cat4"]

  - id: shopping
    label: 쇼핑
    label_ja: ショッピング
    news_queries:
      jp: ["セール", "通販", "ショッピング"]
      tw: ["購物", "特賣", "折扣"]
    keywords:
      jp: ["セール"]
      tw: ["購物"]

  - id: trend
    label: 트렌드
    label_ja: トレンド
    # 실시간 급상승(Google 트렌드 등)이 주로 채웁니다.
    keywords:
      jp: ["トレンド"]
      tw: ["熱門"]

  - id: economy
    label: 경제
    label_ja: 経済
    news_queries:
      jp: ["経済"]
      tw: ["經濟", "股市"]
    keywords:
      jp: ["経済", "株価"]
      tw: ["經濟", "股市"]
    nhk_cats: ["cat5"]

  - id: current_affairs
    label: 시사
    label_ja: 時事
    news_queries:
      jp: ["ニュース", "時事"]
      tw: ["新聞", "時事"]
    keywords:
      jp: ["ニュース"]
      tw: ["新聞"]
    nhk_cats: ["cat0", "cat6"]

# -----------------------------------------------------------------------------
# 데이터 소스 (어댑터)
#   regions: 이 소스가 서비스하는 지역 목록
#   enabled: false 면 수집 안 함. ⚠️는 이용약관/차단 리스크(README 참고)
# -----------------------------------------------------------------------------
sources:
  # ✅ 낮은 리스크 (공개 RSS) — 일본/대만 공통
  google_trends_rss:
    enabled: true
    regions: [jp, tw]
    geo: { jp: JP, tw: TW }
    default_category: trend
    max_items: 25

  # ✅ 낮은 리스크 (RSS 신디케이션) — 카테고리 뉴스 커버, 일본/대만 공통
  google_news_rss:
    enabled: true
    regions: [jp, tw]
    per_category_limit: 12
    locale:
      jp: { hl: ja,    gl: JP, ceid: "JP:ja" }
      tw: { hl: zh-TW, gl: TW, ceid: "TW:zh-Hant" }

  # ⚠️ 중간 리스크 (비공식 pytrends) — 지속 관심도, 일본/대만 공통
  google_trends_interest:
    enabled: true
    regions: [jp, tw]
    geo: { jp: JP, tw: TW }
    hl:  { jp: ja-JP, tw: zh-TW }
    timeframe: "now 7-d"
    max_keywords: 8
    batch_sleep_seconds: 2

  # ✅ 낮은 리스크 (NHK 공식 RSS) — 일본 전용
  nhk_rss:
    enabled: true
    regions: [jp]
    per_feed_limit: 12
    feeds:
      cat0: current_affairs
      cat1: current_affairs
      cat4: politics
      cat5: economy
      cat6: current_affairs

  # ⚠️ 중간 리스크 (제3자 사이트 스크래핑) — 일본 전용(대만판 없음)
  trend_calendar:
    enabled: true
    regions: [jp]
    base_url: { jp: "https://jp.trend-calendar.com/" }
    default_category: trend
    max_items: 30

  # ⚠️⚠️ 높은 리스크 (Yahoo Japan 약관이 자동수집 금지) — 일본 전용
  #   끄려면 enabled: false. (대만에는 적용하지 않음)
  yahoo_realtime:
    enabled: true
    regions: [jp]
    default_category: trend
    max_items: 30

  # ⏸️ 비활성 — YouTube는 별도 도구에서 관리 중이라 이 대시보드에서는 끔.
  #    다시 켜려면 enabled: true 로 바꾸고 .env 에 YOUTUBE_API_KEY 를 넣으면 됩니다.
  youtube_trending:
    enabled: false
    regions: [jp]
    region: JP
    max_items: 40
    category_map:
      "24": entertainment
      "10": entertainment
      "25": current_affairs
    default_category: trend

# -----------------------------------------------------------------------------
# 번역 (트렌드 워드 → 한국어)
#   무료·키 불필요(비공식 Google 엔드포인트). 같은 워드는 캐시로 1회만 번역.
#   끄려면 enabled: false (원어만 표시).
# -----------------------------------------------------------------------------
translation:
  enabled: true
  target_lang: ko
  max_new_per_cycle: 300     # 한 수집 주기당 새로 번역할 최대 워드 수(과호출 방지)
  concurrency: 5             # 동시 번역 요청 수
  timeout_seconds: 10

# -----------------------------------------------------------------------------
# 수집/분류/HTTP/서버
# -----------------------------------------------------------------------------
collection:
  refresh_interval_seconds: 900
  per_source_timeout_seconds: 30
  retention_days: 14
  run_on_startup: true

classification:
  persist_min_occurrences: 3
  persist_min_hours: 6

http:
  user_agent: "JP-TW-Trend-Monitor/1.1 (local research dashboard; +https://github.com/oronaminc/post)"
  default_delay_seconds: 1.5
  timeout_seconds: 20
  max_retries: 3
  host_delays:
    search.yahoo.co.jp: 4.0
    jp.trend-calendar.com: 3.0
    trends.google.com: 2.0

server:
  host: "127.0.0.1"
  port: 8899
